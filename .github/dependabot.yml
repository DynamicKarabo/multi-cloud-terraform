version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      all-deps:
        patterns:
          - "*"
  - package-ecosystem: "terraform"
    directory: "/terraform/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      all-deps:
        patterns:
          - "*"
